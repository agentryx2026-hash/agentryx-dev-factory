# ═══════════════════════════════════════════════════════════
#  PIXEL FACTORY — Nginx Reverse Proxy
#  Domain: dev-hub.agentryx.dev
#  All factory services mapped to clean URL paths
# ═══════════════════════════════════════════════════════════

# Rate limiting zone (prevents abuse)
limit_req_zone $binary_remote_addr zone=factory_limit:10m rate=30r/s;

server {
    server_name dev-hub.agentryx.dev;
    client_max_body_size 50M;

    # ─── Root: Pixel Factory Dashboard (Vite React) ───
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── Preview App Sandbox ───
    location /preview/ {
        # Rewrite to remove /preview/ before passing to the backend
        rewrite ^/preview/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Rewrite absolute paths in HTML
        sub_filter 'href="/' 'href="/preview/';
        sub_filter 'src="/' 'src="/preview/';
        sub_filter_once off;
    }

    # ─── Telemetry Server ───
    location /telemetry/ {
        proxy_pass http://127.0.0.1:4401/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── n8n Workflow Automation ───
    location /n8n/ {
        # Trailing slash: strip /n8n/ before forwarding. n8n (with N8N_PATH=/n8n/)
        # serves assets at unprefixed paths but GENERATES HTML containing /n8n/-
        # prefixed URLs. Nginx strips on request; n8n prefixes on response.
        proxy_pass http://127.0.0.1:5678/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # ─── LangFuse Observability ───
    location /langfuse/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── ChromaDB Vector API ───
    location /chromadb/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Admin: API Key Console (Phase 2.5) ───
    # API endpoints — basic auth gated. Any authenticated user can manage keys
    # (full role separation lands in Phase 12 / B7 admin module).
    location /admin/api/ {
        auth_basic "Agentryx Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-claw-code;
        # Strip /admin/ prefix; admin-keys.mjs serves /api/admin/keys/* directly.
        rewrite ^/admin/(.*) /$1 break;
        proxy_pass http://127.0.0.1:4402;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass the authenticated user through so admin-keys.mjs can audit it.
        proxy_set_header X-Remote-User $remote_user;
    }

    # Admin UI page (Vite SPA) — same auth, served by the dashboard.
    # The dashboard's React Router handles the /admin/keys route client-side.
    location /admin/ {
        auth_basic "Agentryx Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-claw-code;
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Vite dev server needs Upgrade for HMR websockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dev-hub.agentryx.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dev-hub.agentryx.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = dev-hub.agentryx.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name dev-hub.agentryx.dev;
    return 404; # managed by Certbot


}